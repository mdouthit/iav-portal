<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IAV Project Portal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FDEF5A; min-height: 100vh; }
  .app { min-height: 100vh; }

  /* Login */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .login-card { background: white; border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; border: 2px solid #F4C0D1; }
  .login-title { font-size: 22px; font-weight: 500; color: #D4537E; text-align: center; margin-bottom: 0.25rem; }
  .login-sub { font-size: 14px; color: #888780; text-align: center; margin-bottom: 2rem; }
  .field-label { font-size: 13px; color: #888780; margin-bottom: 6px; display: block; }
  .field-input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #F4C0D1; font-size: 15px; color: #2C2C2A; background: #FBEAF0; outline: none; margin-bottom: 1rem; }
  .field-input:focus { border-color: #D4537E; }
  .btn-primary { width: 100%; padding: 12px; border-radius: 10px; background: #4DEB6A; border: none; font-size: 15px; font-weight: 500; color: #173404; cursor: pointer; }
  .btn-primary:hover { opacity: 0.85; }
  .login-error { color: #D4537E; font-size: 13px; text-align: center; margin-top: 0.75rem; display: none; }

  /* ============================================================
     DISCO BANANA LOADING SCREEN
     To remove: delete this CSS block and the #discoScreen div in the HTML,
     and remove the showDiscoLoader() call in the login() function.
     ============================================================ */
  #discoScreen { display: none; position: fixed; inset: 0; background: #111; z-index: 999; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  .disco-floor { position: absolute; bottom: 0; left: 0; right: 0; height: 35%; background: repeating-linear-gradient(90deg, #ff00ff22 0px, #ff00ff22 1px, transparent 1px, transparent 40px), repeating-linear-gradient(0deg, #00ffff22 0px, #00ffff22 1px, transparent 1px, transparent 40px); }
  .disco-ball { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff 0%, #aaa 40%, #555 100%); position: relative; margin-bottom: 1.5rem; animation: spin 2s linear infinite; box-shadow: 0 0 30px #fff8, 0 0 60px #fff4; }
  .disco-ball::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; background: conic-gradient(#ff00ff, #00ffff, #ffff00, #ff00ff); opacity: 0.3; animation: spin 1s linear infinite reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .disco-light { position: absolute; top: 0; width: 3px; height: 60%; transform-origin: top center; animation: sweep 1.5s ease-in-out infinite alternate; }
  .disco-light-1 { left: 30%; background: linear-gradient(to bottom, #ff00ff, transparent); animation-delay: 0s; }
  .disco-light-2 { left: 50%; background: linear-gradient(to bottom, #00ffff, transparent); animation-delay: 0.3s; }
  .disco-light-3 { left: 70%; background: linear-gradient(to bottom, #ffff00, transparent); animation-delay: 0.6s; }
  @keyframes sweep { from { transform: rotate(-30deg); } to { transform: rotate(30deg); } }
  .bananas-stage { display: flex; gap: 1.5rem; align-items: flex-end; margin-bottom: 1rem; position: relative; z-index: 2; }
  .banana { font-size: 48px; display: inline-block; animation: dance 0.6s ease-in-out infinite alternate; transform-origin: bottom center; filter: drop-shadow(0 0 8px #ffff0088); }
  .banana:nth-child(1) { animation-delay: 0s; }
  .banana:nth-child(2) { animation-delay: 0.15s; }
  .banana:nth-child(3) { animation-delay: 0s; animation-name: dance2; }
  .banana:nth-child(4) { animation-delay: 0.15s; }
  .banana:nth-child(5) { animation-delay: 0s; }
  @keyframes dance  { from { transform: rotate(-20deg) scaleY(0.9); } to { transform: rotate(20deg) scaleY(1.1); } }
  @keyframes dance2 { from { transform: rotate(20deg) scaleY(1.1); } to { transform: rotate(-20deg) scaleY(0.9); } }
  .disco-text { color: white; font-size: 18px; font-weight: 500; letter-spacing: 0.1em; animation: colorshift 0.5s linear infinite; position: relative; z-index: 2; margin-top: 0.5rem; }
  @keyframes colorshift { 0%{color:#ff00ff} 33%{color:#00ffff} 66%{color:#ffff00} 100%{color:#ff00ff} }
  .disco-sub { color: #ffffff88; font-size: 13px; margin-top: 0.5rem; position: relative; z-index: 2; }
  .confetti-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; animation: fall linear infinite; }
  @keyframes fall { from { transform: translateY(-20px) rotate(0deg); opacity: 1; } to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

  /* Dashboard */
  .dashboard { display: none; padding: 1.5rem; max-width: 760px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .greeting { font-size: 18px; font-weight: 500; color: #993556; }
  .logout-btn { font-size: 13px; color: #D4537E; background: none; border: 1.5px solid #F4C0D1; border-radius: 8px; padding: 6px 14px; cursor: pointer; }

  /* Tabs */
  .tab-row { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab { padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; white-space: nowrap; }
  .tab.active { background: #D4537E; color: white; }
  .tab.inactive { background: white; color: #D4537E; border-color: #F4C0D1; }
  .tab.emp-active { background: #27500A; color: white; }
  .tab.emp-inactive { background: white; color: #3B6D11; border-color: #C0DD97; }
  .subtab-row { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .subtab { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid #C0DD97; color: #3B6D11; background: white; }
  .subtab.active { background: #4DEB6A; color: #173404; border-color: #4DEB6A; }

  /* Cards */
  .project-card { background: white; border-radius: 16px; border: 2px solid #F4C0D1; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .project-card.emp-card { border-color: #C0DD97; }
  .project-card.pending-card { border-color: #FAC775; }
  .card-timestamp { font-size: 11px; color: #888780; margin-bottom: 4px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
  .address { font-size: 17px; font-weight: 500; color: #2C2C2A; }
  .badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px; }
  .badge-high { background: #FAECE7; color: #993C1D; }
  .badge-normal { background: #EAF3DE; color: #3B6D11; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .detail-key { font-size: 12px; color: #888780; margin-bottom: 2px; }
  .detail-val { font-size: 14px; color: #2C2C2A; font-weight: 500; }
  .notes-box { background: rgba(77,235,106,0.15); border-radius: 10px; padding: 0.75rem 1rem; font-size: 13px; color: #444441; line-height: 1.6; margin-bottom: 1rem; }
  .route-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; margin-bottom: 0.75rem; background: #E6F1FB; color: #185FA5; }

  /* Expand panels */
  .expand-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .expand-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid #F4C0D1; background: white; color: #D4537E; }
  .expand-btn:hover { background: #FBEAF0; }
  .expand-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .panel { background: #FBEAF0; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; display: none; }
  .panel.open { display: block; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .panel-title { font-size: 13px; font-weight: 500; color: #993556; }
  .close-btn { font-size: 18px; color: #D4537E; cursor: pointer; background: none; border: none; line-height: 1; }
  .attachment-preview { background: #e8e8e8; border-radius: 8px; height: 140px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; font-size: 13px; color: #5F5E5A; }
  .download-btn { display: inline-block; padding: 8px 18px; border-radius: 8px; background: #4DEB6A; border: none; font-size: 13px; font-weight: 500; color: #173404; cursor: pointer; text-decoration: none; }
  .email-subject { font-size: 13px; font-weight: 500; color: #2C2C2A; margin-bottom: 0.5rem; }
  .email-body { font-size: 13px; color: #444441; line-height: 1.6; white-space: pre-wrap; }

  /* Actions */
  .card-actions { display: flex; gap: 0.75rem; margin-top: 0.25rem; }
  .btn-accept { flex: 1; padding: 10px; border-radius: 10px; background: #4DEB6A; border: none; font-size: 14px; font-weight: 500; color: #173404; cursor: pointer; }
  .btn-decline { flex: 1; padding: 10px; border-radius: 10px; background: white; border: 1.5px solid #F4C0D1; font-size: 14px; font-weight: 500; color: #D4537E; cursor: pointer; }
  .btn-decline:hover { background: #FBEAF0; }
  .btn-undo { width: 100%; padding: 10px; border-radius: 10px; background: white; border: 1.5px solid #F4C0D1; font-size: 13px; font-weight: 500; color: #D4537E; cursor: pointer; margin-top: 0.5rem; }
  .btn-undo:hover { background: #FBEAF0; }
  .btn-reassign { width: 100%; padding: 10px; border-radius: 10px; background: white; border: 1.5px solid #C0DD97; font-size: 13px; font-weight: 500; color: #3B6D11; cursor: pointer; margin-top: 0.5rem; }
  .btn-reassign:hover { background: rgba(77,235,106,0.1); }

  /* Reaccept banner */
  .reaccept-banner { background: #FAEEDA; border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1rem; }
  .reaccept-label { font-size: 12px; font-weight: 500; color: #854F0B; margin-bottom: 0.5rem; }
  .reaccept-actions { display: flex; gap: 0.5rem; }
  .btn-approve { flex: 1; padding: 8px; border-radius: 8px; background: #4DEB6A; border: none; font-size: 13px; font-weight: 500; color: #173404; cursor: pointer; }
  .btn-deny { flex: 1; padding: 8px; border-radius: 8px; background: white; border: 1.5px solid #F4C0D1; font-size: 13px; font-weight: 500; color: #D4537E; cursor: pointer; }

  /* Finish section */
  .finish-section { background: rgba(77,235,106,0.1); border-radius: 12px; padding: 1rem; margin-top: 0.75rem; }
  .finish-label { font-size: 12px; color: #3B6D11; font-weight: 500; margin-bottom: 0.5rem; }
  .finish-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem; }
  .time-select { flex: 1; padding: 8px 10px; border-radius: 8px; border: 1.5px solid #C0DD97; font-size: 13px; color: #2C2C2A; background: white; }
  .btn-finish { padding: 9px 20px; border-radius: 8px; background: #4DEB6A; border: none; font-size: 13px; font-weight: 500; color: #173404; cursor: pointer; white-space: nowrap; }
  .btn-finish:disabled { opacity: 0.4; cursor: not-allowed; }
  .upload-box { border: 1.5px dashed #C0DD97; border-radius: 8px; padding: 0.75rem 1rem; text-align: center; font-size: 12px; color: #3B6D11; cursor: pointer; position: relative; margin-bottom: 0.5rem; }
  .upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-box.has-file { background: rgba(77,235,106,0.15); border-style: solid; }

  /* Completed meta */
  .completed-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
  .meta-item { background: rgba(77,235,106,0.12); border-radius: 8px; padding: 0.5rem 0.75rem; }

  /* Loading / empty */
  .empty-state { text-align: center; padding: 3rem 1rem; color: #888780; font-size: 15px; }
  .loading-state { text-align: center; padding: 3rem 1rem; color: #888780; font-size: 15px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #F4C0D1; border-top-color: #D4537E; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
  .modal-box { background: white; border-radius: 16px; padding: 1.75rem; max-width: 320px; width: 90%; border: 2px solid #F4C0D1; }
  .modal-title { font-size: 16px; font-weight: 500; color: #2C2C2A; margin-bottom: 0.5rem; }
  .modal-body { font-size: 14px; color: #888780; line-height: 1.6; margin-bottom: 1.25rem; }
  .modal-actions { display: flex; gap: 0.75rem; }
  .modal-confirm { flex: 1; padding: 10px; border-radius: 10px; background: #D4537E; border: none; font-size: 14px; font-weight: 500; color: white; cursor: pointer; }
  .modal-cancel { flex: 1; padding: 10px; border-radius: 10px; background: white; border: 1.5px solid #F4C0D1; font-size: 14px; font-weight: 500; color: #D4537E; cursor: pointer; }

  .pending-note { background: #FAEEDA; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #854F0B; margin-top: 0.5rem; }
</style>
</head>
<body>
<div class="app" id="app">

    <!-- ============================================================
       DISCO BANANA LOADING SCREEN
       To remove: delete this entire div block
       ============================================================ -->
  <div id="discoScreen">
    <div class="disco-light disco-light-1"></div>
    <div class="disco-light disco-light-2"></div>
    <div class="disco-light disco-light-3"></div>
    <div class="disco-floor"></div>
    <div class="disco-ball"></div>
    <div class="bananas-stage">
      <span class="banana">🍌</span>
      <span class="banana">🍌</span>
      <span class="banana">🍌</span>
      <span class="banana">🍌</span>
      <span class="banana">🍌</span>
    </div>
    <p class="disco-text">LOADING YOUR PROJECTS</p>
    <p class="disco-sub">the bananas are working on it</p>
  </div>

  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <p class="login-title">IAV</p>
      <p class="login-sub">Project intake portal</p>
      <label class="field-label">Username</label>
      <input class="field-input" type="text" id="usernameInput" placeholder="your name" />
      <label class="field-label">Password</label>
      <input class="field-input" type="password" id="passwordInput" placeholder="••••••••" />
      <button class="btn-primary" onclick="login()">Sign in</button>
      <p class="login-error" id="loginError">Incorrect username or password</p>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="top-bar">
      <p class="greeting" id="greetingText">Good morning</p>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
    <div class="tab-row" id="tabRow"></div>
    <div id="subtabRow"></div>
    <div id="projectList"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <p class="modal-title" id="modalTitle"></p>
      <p class="modal-body" id="modalBody"></p>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" id="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>

</div>
<script>
// ============================================================
// CONFIGURATION — fill these in after setting up n8n webhooks
// ============================================================
const CONFIG = {
  // Webhook URLs (fill in after creating n8n webhooks)
  WEBHOOKS: {
    GET_PROJECTS:   'https://douthit.app.n8n.cloud/webhook/get-projects',
    UPDATE_PROJECT: 'YOUR_N8N_WEBHOOK_URL/update-project',
    UPLOAD_FILE:    'YOUR_N8N_WEBHOOK_URL/upload-file',
  },
  // User accounts — in production move this to a backend/auth system
  USERS: [
    { username: 'sam',  password: '#n00b$',      name: 'Sam', role: 'employee' },
    { username: 'tim',  password: '#3Ldern00b',  name: 'Tim', role: 'manager'  },
  ]
};

const TIME_OPTIONS = ['15 mins','30 mins','45 mins','1 hour','1 hr 15 mins','1 hr 30 mins','1 hr 45 mins','2 hours'];

let currentUser = null;
let activeTab = 'new';
let activeSubtab = 'new';
let openPanels = {};
let uploadedFiles = {};
let pendingModal = null;
let projects = [];

function fmt(d) {
  if (!d) return '—';
  const date = typeof d === 'string' ? new Date(d) : d;
  return date.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

// ============================================================
// AUTH
// ============================================================

// ============================================================
// DISCO BANANA LOADER
// To remove: delete this entire showDiscoLoader function,
// and remove the showDiscoLoader(callback) call in login() below.
// ============================================================
function showDiscoLoader(callback) {
  const screen = document.getElementById('discoScreen');
  screen.style.display = 'flex';

  // Spawn confetti dots
  const colors = ['#ff00ff','#00ffff','#ffff00','#ff6699','#66ffcc'];
  for (let i = 0; i < 30; i++) {
    const dot = document.createElement('div');
    dot.className = 'confetti-dot';
    dot.style.left = Math.random() * 100 + 'vw';
    dot.style.background = colors[Math.floor(Math.random() * colors.length)];
    dot.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    dot.style.animationDelay = (Math.random() * 2) + 's';
    screen.appendChild(dot);
  }

  setTimeout(() => {
    screen.style.display = 'none';
    // Remove confetti dots
    screen.querySelectorAll('.confetti-dot').forEach(d => d.remove());
    callback();
  }, 2500);
}
// ============================================================

function login() {
  const u = document.getElementById('usernameInput').value.trim().toLowerCase();
  const p = document.getElementById('passwordInput').value;
  const user = CONFIG.USERS.find(x => x.username === u && x.password === p);
  if (!user) { document.getElementById('loginError').style.display = 'block'; return; }
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';

  // Remove the showDiscoLoader call below to skip the loading screen
  showDiscoLoader(() => {
    document.getElementById('dashboard').style.display = 'block';
    const hr = new Date().getHours();
    document.getElementById('greetingText').textContent = (hr<12?'Good morning':hr<17?'Good afternoon':'Good evening') + ', ' + user.name;
    activeTab = 'new'; activeSubtab = 'new';
    loadProjects();
  });
}

function logout() {
  currentUser = null; openPanels = {}; uploadedFiles = {}; projects = [];
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('usernameInput').value = '';
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// ============================================================
// DATA — Airtable via n8n webhooks
// ============================================================
async function loadProjects() {
  showLoading();
  try {
    const res = await fetch(CONFIG.WEBHOOKS.GET_PROJECTS, { method: 'GET' });
    const data = await res.json();
    // Map Airtable field names to the flat structure the UI expects
    projects = data.map(record => mapAirtableRecord(record));
  } catch(e) {
    console.warn('Webhook not reachable, using sample data');
    projects = getSampleProjects();
  }
  renderTabs();
  renderProjects();
}

function mapAirtableRecord(record) {
  const f = record.fields;
  const type = f['Project Type'] || 'Other';
  // Phase I goes to employees, everything else goes to manager
  const owner = type === 'Phase I' ? 'employee' : 'manager';
  const statusRaw = (f['Status'] || 'New').toLowerCase();
  // Map Airtable status values to internal status keys
  const statusMap = { 'new': 'new', 'accepted': 'accepted', 'declined': 'declined', 'completed': 'completed' };
  const status = statusMap[statusRaw] || 'new';
  return {
    id:              record.id,
    address:         f['Subject Address'] || '—',
    client:          f['Client Name'] || '—',
    email:           f['Client Email'] || '—',
    type:            type,
    urgency:         f['Urgency'] || 'Normal',
    notes:           f['Notes'] || '—',
    received:        f['Date Received'] || record.createdTime,
    subject:         f['Subject'] || '',
    body:            f['Email Body'] || '—',
    attachmentName:  f['Attachment']?.[0]?.filename || '',
    attachmentUrl:   f['Attachment']?.[0]?.url || '',
    status:          status,
    owner:           f['Owner'] || owner,
    acceptedBy:      f['Accepted By'] || null,
    declinedBy:      f['Declined By'] || null,
    reacceptPending: f['Reaccept Pending'] || false,
    completedAt:     f['Completed At'] || null,
    timeSpent:       f['Time Spent'] || null,
    completedFile:   f['Completed File'] || null,
    completedFileUrl:f['Completed File URL'] || null,
  };
}

async function updateProject(id, fields) {
  try {
    await fetch(CONFIG.WEBHOOKS.UPDATE_PROJECT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, fields })
    });
  } catch(e) {
    console.warn('Webhook not configured, running in local mode');
  }
  // Always update local state immediately for snappy UI
  const p = projects.find(x => x.id === id);
  if (p) Object.assign(p, fields);
}

async function uploadFile(id, file) {
  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('projectId', id);
    const res = await fetch(CONFIG.WEBHOOKS.UPLOAD_FILE, { method: 'POST', body: formData });
    const data = await res.json();
    return data.url || null;
  } catch(e) {
    console.warn('File upload webhook not configured');
    return null;
  }
}

function getSampleProjects() {
  return [
    { id:'rec001', address:'850 Mt. Pleasant Ave, Ann Arbor, MI 48103', client:'Max Douthit', email:'firefoop@gmail.com', type:'Phase I', urgency:'High', notes:'Client submitted satellite map with multiple labeled structures. Requesting Phase I environmental assessment.', received: new Date(Date.now()-1000*60*37).toISOString(), subject:'Phase I Assessment — 850 Mt. Pleasant Ave', body:'Hi,\n\nI\'d like to request a Phase I assessment for 850 Mt. Pleasant Ave. Satellite map attached.\n\nThanks,\nMax Douthit', attachmentName:'site_map_850.png', attachmentUrl:'', status:'new', owner:'employee' },
    { id:'rec002', address:'1220 Fuller Rd, Ann Arbor, MI 48104', client:'Jennifer Walsh', email:'j.walsh@gmail.com', type:'Phase II', urgency:'Normal', notes:'Follow-up Phase II assessment after initial findings.', received: new Date(Date.now()-1000*60*60*3).toISOString(), subject:'Phase II Follow-Up — 1220 Fuller Rd', body:'Hello,\n\nWe\'d like to move forward with a Phase II investigation for 1220 Fuller Rd.\n\nBest,\nJennifer Walsh', attachmentName:'aerial_1220_fuller.png', attachmentUrl:'', status:'new', owner:'manager' },
    { id:'rec003', address:'402 S Division St, Ann Arbor, MI 48104', client:'Robert Chen', email:'r.chen@email.com', type:'Other', urgency:'Normal', notes:'New commercial property purchase requiring environmental clearance.', received: new Date(Date.now()-1000*60*60*5).toISOString(), subject:'Environmental Assessment — 402 S Division St', body:'Hello,\n\nWe are purchasing 402 S Division St and require an environmental assessment.\n\nRegards,\nRobert Chen', attachmentName:'division_st_map.png', attachmentUrl:'', status:'new', owner:'manager' }
  ];
}

// ============================================================
// TABS
// ============================================================
function renderTabs() {
  let tabs;
  if (currentUser.role === 'manager') {
    tabs = [{id:'new',label:'New'},{id:'declined',label:'Declined'},{id:'completed',label:'Completed'},{id:'employees',label:'Employees'}];
  } else {
    tabs = [{id:'new',label:'New'},{id:'accepted',label:'Accepted'},{id:'declined',label:'Declined'},{id:'completed',label:'Completed'}];
  }
  document.getElementById('tabRow').innerHTML = tabs.map(t => {
    let cls;
    if (currentUser.role==='manager' && t.id==='employees') cls = activeTab===t.id ? 'emp-active' : 'emp-inactive';
    else cls = activeTab===t.id ? 'active' : 'inactive';
    return `<div class="tab ${cls}" onclick="switchTab('${t.id}')">${t.label}</div>`;
  }).join('');

  if (currentUser.role==='manager' && activeTab==='employees') {
    const subs = [{id:'new',label:'New'},{id:'accepted',label:'Accepted'},{id:'declined',label:'Declined'},{id:'completed',label:'Completed'}];
    document.getElementById('subtabRow').innerHTML = `<div class="subtab-row">${subs.map(s=>`<div class="subtab ${activeSubtab===s.id?'active':''}" onclick="switchSubtab('${s.id}')">${s.label}</div>`).join('')}</div>`;
  } else {
    document.getElementById('subtabRow').innerHTML = '';
  }
}

function switchTab(t) { activeTab=t; activeSubtab='new'; renderTabs(); renderProjects(); }
function switchSubtab(s) { activeSubtab=s; renderTabs(); renderProjects(); }

// ============================================================
// MODAL
// ============================================================
function showModal(title, body, fn) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  document.getElementById('modalOverlay').style.display = 'flex';
  pendingModal = fn;
}
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; pendingModal = null; }
document.getElementById('modalConfirm').onclick = function() { if (pendingModal) pendingModal(); closeModal(); };

// ============================================================
// FILE UPLOAD
// ============================================================
function handleFileUpload(id, input) {
  if (input.files && input.files[0]) {
    uploadedFiles[id] = input.files[0];
    const box = document.getElementById('uploadBox_'+id);
    if (box) { box.classList.add('has-file'); box.querySelector('span').textContent = input.files[0].name; }
    checkFinishReady(id);
  }
}
function checkFinishReady(id) {
  const s = document.getElementById('timeSelect_'+id);
  const b = document.getElementById('finishBtn_'+id);
  if (!s||!b) return;
  b.disabled = !(s.value && uploadedFiles[id]);
}

// ============================================================
// PROJECT ACTIONS
// ============================================================
async function acceptProject(id) {
  await updateProject(id, { status:'accepted', acceptedBy: currentUser.name, acceptedAt: new Date().toISOString() });
  activeTab='accepted'; renderTabs(); renderProjects();
}

async function declineProject(id) {
  await updateProject(id, { status:'declined', declinedBy: currentUser.name });
  activeTab='declined'; renderTabs(); renderProjects();
}

async function undoAccept(id) {
  await updateProject(id, { status:'declined', declinedBy: currentUser.name, acceptedBy: null });
  activeTab='declined'; renderTabs(); renderProjects();
}

async function undoComplete(id) {
  await updateProject(id, { status:'accepted', completedAt: null, timeSpent: null, completedFile: null });
  activeTab='accepted'; renderTabs(); renderProjects();
}

async function undoCompleteMgr(id) {
  await updateProject(id, { status:'new', completedAt: null, timeSpent: null, completedFile: null });
  activeTab='new'; renderTabs(); renderProjects();
}

async function requestReaccept(id) {
  await updateProject(id, { reacceptPending: true });
  renderProjects();
}

async function approveReaccept(id) {
  await updateProject(id, { status:'new', reacceptPending: false, declinedBy: null });
  renderProjects();
}

async function denyReaccept(id) {
  await updateProject(id, { reacceptPending: false });
  renderProjects();
}

async function reassignToEmployee(id) {
  await updateProject(id, { status:'new', owner:'employee', reacceptPending: false, declinedBy: null, acceptedBy: null });
  renderProjects();
}

async function finishProject(id) {
  const sel = document.getElementById('timeSelect_'+id);
  if (!sel || !sel.value || !uploadedFiles[id]) return;
  const btn = document.getElementById('finishBtn_'+id);
  btn.textContent = 'Saving...'; btn.disabled = true;
  const fileUrl = await uploadFile(id, uploadedFiles[id]);
  await updateProject(id, {
    status: 'completed',
    completedAt: new Date().toISOString(),
    timeSpent: sel.value,
    completedFile: uploadedFiles[id].name,
    completedFileUrl: fileUrl || ''
  });
  delete uploadedFiles[id];
  activeTab='completed'; renderTabs(); renderProjects();
}

// ============================================================
// RENDER HELPERS
// ============================================================
function showLoading() {
  document.getElementById('projectList').innerHTML = `<div class="loading-state"><div class="spinner"></div><br>Loading projects...</div>`;
}

function renderExpandPanels(p) {
  const ak=p.id+'_attach', ek=p.id+'_email';
  return `<div class="expand-row">
    <button class="expand-btn" onclick="togglePanel('${p.id}','attach')"><svg viewBox="0 0 16 16" fill="none" stroke="#D4537E" stroke-width="1.5"><path d="M4 8l4-4 4 4M8 4v8"/><rect x="2" y="11" width="12" height="3" rx="1"/></svg>Attachment</button>
    <button class="expand-btn" onclick="togglePanel('${p.id}','email')"><svg viewBox="0 0 16 16" fill="none" stroke="#D4537E" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M2 5l6 4 6-4"/></svg>Email</button>
  </div>
  <div class="panel ${openPanels[ak]?'open':''}" id="panel_${ak}">
    <div class="panel-header"><span class="panel-title">${p.attachmentName||'Attachment'}</span><button class="close-btn" onclick="togglePanel('${p.id}','attach')">×</button></div>
    <div class="attachment-preview">${p.attachmentUrl ? `<img src="${p.attachmentUrl}" style="max-height:130px;max-width:100%;border-radius:6px;" />` : '[ No attachment preview available ]'}</div>
    ${p.attachmentUrl ? `<a class="download-btn" href="${p.attachmentUrl}" download target="_blank">Download</a>` : ''}
  </div>
  <div class="panel ${openPanels[ek]?'open':''}" id="panel_${ek}">
    <div class="panel-header"><span class="panel-title">Email</span><button class="close-btn" onclick="togglePanel('${p.id}','email')">×</button></div>
    <p class="email-subject">${p.subject||'—'}</p><p class="email-body">${p.body||p.emailBody||'—'}</p>
  </div>`;
}

function togglePanel(id, type) {
  const k=id+'_'+type; openPanels[k]=!openPanels[k];
  const el=document.getElementById('panel_'+k);
  if(el) el.classList.toggle('open', openPanels[k]);
}

function renderBaseCard(p, showRouteTag=false) {
  return `${showRouteTag ? '<span class="route-tag">Employee declined</span><br>' : ''}
  <p class="card-timestamp">${fmt(p.received)}</p>
  <div class="card-header"><p class="address">${p.address}</p><span class="badge badge-${(p.urgency||'normal').toLowerCase()}">${p.urgency||'Normal'} priority</span></div>
  <div class="card-grid">
    <div><p class="detail-key">Client</p><p class="detail-val">${p.client}</p></div>
    <div><p class="detail-key">Project type</p><p class="detail-val">${p.type}</p></div>
  </div>
  <div class="notes-box">${p.notes||'—'}</div>`;
}

function renderFinishSection(p) {
  const opts = TIME_OPTIONS.map(t=>`<option value="${t}">${t}</option>`).join('');
  return `<div class="finish-section">
    <p class="finish-label">Mark as complete</p>
    <div class="finish-row">
      <select class="time-select" id="timeSelect_${p.id}" onchange="checkFinishReady('${p.id}')"><option value="">Time spent...</option>${opts}</select>
      <button class="btn-finish" id="finishBtn_${p.id}" disabled onclick="finishProject('${p.id}')">Mark done</button>
    </div>
    <div class="upload-box ${uploadedFiles[p.id]?'has-file':''}" id="uploadBox_${p.id}">
      <input type="file" onchange="handleFileUpload('${p.id}',this)" />
      <span>${uploadedFiles[p.id]?uploadedFiles[p.id].name:'Upload completed project file'}</span>
    </div>
  </div>`;
}

function renderCompletedMeta(p) {
  return `<div class="completed-meta">
    <div class="meta-item"><p class="detail-key">Completed</p><p class="detail-val" style="font-size:12px">${fmt(p.completedAt)}</p></div>
    <div class="meta-item"><p class="detail-key">Time spent</p><p class="detail-val" style="font-size:12px">${p.timeSpent||'—'}</p></div>
    <div class="meta-item"><p class="detail-key">File</p>${p.completedFileUrl?`<a class="download-btn" href="${p.completedFileUrl}" download target="_blank" style="padding:4px 10px;font-size:11px;margin-top:2px;display:inline-block">Download</a>`:'<p class="detail-val" style="font-size:12px">—</p>'}</div>
  </div>`;
}

// ============================================================
// MAIN RENDER
// ============================================================
function renderProjects() {
  const list = document.getElementById('projectList');

  // --- EMPLOYEE ---
  if (currentUser.role === 'employee') {
    let filtered = projects.filter(p => {
      if (p.owner !== 'employee') return false;
      if (activeTab==='new') return p.status==='new';
      if (activeTab==='accepted') return p.status==='accepted' && p.acceptedBy===currentUser.name;
      if (activeTab==='declined') return p.status==='declined' && p.declinedBy===currentUser.name;
      if (activeTab==='completed') return p.status==='completed' && p.acceptedBy===currentUser.name;
      return false;
    });
    if (!filtered.length) { list.innerHTML=`<div class="empty-state">No ${activeTab} projects right now</div>`; return; }
    list.innerHTML = filtered.map(p => {
      let actions = '';
      if (activeTab==='new') {
        actions=`<div class="card-actions"><button class="btn-accept" onclick="acceptProject('${p.id}')">Accept</button><button class="btn-decline" onclick="showModal('Decline project?','Are you sure you would like to decline this project?',function(){declineProject('${p.id}');})">Decline</button></div>`;
      } else if (activeTab==='accepted') {
        actions=renderFinishSection(p)+`<button class="btn-undo" onclick="showModal('Decline this project?','Are you sure you would like to decline this project?',function(){undoAccept('${p.id}');})">Undo acceptance — decline project</button>`;
      } else if (activeTab==='declined') {
        actions = p.reacceptPending
          ? `<div class="pending-note">Re-accept request sent to manager — awaiting approval</div>`
          : `<button class="btn-reassign" onclick="requestReaccept('${p.id}')">Request to re-accept project</button>`;
      } else if (activeTab==='completed') {
        actions=`<button class="btn-undo" onclick="showModal('Undo completion?','Move this project back to Accepted?',function(){undoComplete('${p.id}');})">Undo — move back to accepted</button>`;
      }
      if (activeTab==='completed') return `<div class="project-card">${renderBaseCard(p)}${renderExpandPanels(p)}${renderCompletedMeta(p)}${actions}</div>`;
      return `<div class="project-card">${renderBaseCard(p)}${renderExpandPanels(p)}${actions}</div>`;
    }).join('');
    return;
  }

  // --- MANAGER: Employees tab ---
  if (activeTab === 'employees') {
    const emp = projects.filter(p => {
      if (p.owner !== 'employee') return false;
      if (activeSubtab==='new') return p.status==='new';
      if (activeSubtab==='accepted') return p.status==='accepted';
      if (activeSubtab==='declined') return p.status==='declined';
      if (activeSubtab==='completed') return p.status==='completed';
      return false;
    });
    if (!emp.length) { list.innerHTML=`<div class="empty-state">No ${activeSubtab} projects in employee queue</div>`; return; }
    list.innerHTML = emp.map(p => {
      let extra = '';
      if (activeSubtab==='accepted') extra=`<div style="margin-bottom:0.75rem"><p class="detail-key">Accepted by</p><p class="detail-val">${p.acceptedBy||'—'}</p></div>`;
      if (activeSubtab==='declined') extra=`<div style="margin-bottom:0.75rem"><p class="detail-key">Declined by</p><p class="detail-val">${p.declinedBy||'—'}</p></div>`;
      if (activeSubtab==='completed') return `<div class="project-card emp-card">${renderBaseCard(p)}${renderExpandPanels(p)}${renderCompletedMeta(p)}</div>`;
      return `<div class="project-card emp-card">${renderBaseCard(p)}${renderExpandPanels(p)}${extra}</div>`;
    }).join('');
    return;
  }

  // --- MANAGER: own tabs ---
  let filtered = [];
  if (activeTab==='new') {
    filtered = projects.filter(p => p.owner==='manager' && p.status==='new');
  } else if (activeTab==='declined') {
    filtered = projects.filter(p => p.owner==='employee' && p.status==='declined');
  } else if (activeTab==='completed') {
    filtered = projects.filter(p => p.owner==='manager' && p.status==='completed');
  }

  if (!filtered.length) { list.innerHTML=`<div class="empty-state">No ${activeTab} projects right now</div>`; return; }

  list.innerHTML = filtered.map(p => {
    let actions = '';
    if (activeTab==='new') {
      actions = renderFinishSection(p);
    } else if (activeTab==='declined') {
      const banner = p.reacceptPending ? `<div class="reaccept-banner"><p class="reaccept-label">Employee requested to re-accept this project</p><div class="reaccept-actions"><button class="btn-approve" onclick="approveReaccept('${p.id}')">Approve</button><button class="btn-deny" onclick="denyReaccept('${p.id}')">Deny</button></div></div>` : '';
      actions = banner + renderFinishSection(p) + `<button class="btn-reassign" onclick="showModal('Reassign project?','Send this project back to the employee new tab?',function(){reassignToEmployee('${p.id}');})">Reassign to employees</button>`;
    } else if (activeTab==='completed') {
      actions = `<button class="btn-undo" onclick="showModal('Undo completion?','Move this project back to New?',function(){undoCompleteMgr('${p.id}');})">Undo — move back to new</button>`;
    }
    if (activeTab==='completed') return `<div class="project-card">${renderBaseCard(p,false)}${renderExpandPanels(p)}${renderCompletedMeta(p)}${actions}</div>`;
    return `<div class="project-card ${p.reacceptPending?'pending-card':''}">${renderBaseCard(p, activeTab==='declined')}${renderExpandPanels(p)}${actions}</div>`;
  }).join('');
}
</script>
